name: sende_de_var
description: "Sende De Var - namaz vakitleri, kıble yönü, hadisler ve daha fazlasını bir arada sunan İslami yaşam uygulaması."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  carousel_slider: ^5.1.1
  cloud_firestore: ^6.0.3
  device_info_plus: ^11.3.0
  firebase_auth: ^6.1.1
  firebase_core: ^4.2.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_screenutil: ^5.9.3
  geolocator: ^14.0.2
  google_maps_flutter: ^2.14.2
  http: ^1.5.0
  package_info_plus: ^8.3.0
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  flutter_qiblah: ^3.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/home/
    - assets/abdest/
    - assets/namaz/
    - assets/bottom_nav_bar/
    - assets/profile/
    - assets/auth/
    - assets/mosque/
    - assets/logo/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo/sunnet-app-logo.png"
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "assets/logo/sunnet-app-logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/logo/sunnet-app-logo.png"
